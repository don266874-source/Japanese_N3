<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShadowGeek AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              mono: ['"JetBrains Mono"', 'monospace'],
              sans: ['"Noto Sans JP"', 'sans-serif'],
            },
            colors: {
              cyber: {
                black: '#050505',
                dark: '#0a0a0f',
                gray: '#12121a',
                slate: '#1e1e2a',
                primary: '#00f0ff',
                secondary: '#7000ff',
                accent: '#ff003c',
                dim: 'rgba(0, 240, 255, 0.1)',
              }
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #050505;
        color: #e0e0e0;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0f;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e1e2a;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00f0ff;
      }
      rt {
        font-size: 0.5em;
        color: #00f0ff; /* Cyber Primary Blue */
        -webkit-text-fill-color: #00f0ff; /* Override parent gradient text fill */
        font-weight: normal;
        user-select: none;
        text-align: center;
      }
      /* Ensure ruby aligns well with inline gradient text */
      ruby {
        display: inline-flex;
        flex-direction: column-reverse;
        vertical-align: bottom;
        margin: 0 2px;
        ruby-position: over;
      }

      /* Analysis Content Styles */
      .analysis-content h3 {
        font-size: 0.85rem;
        font-weight: bold;
        color: #9ca3af; /* gray-400 */
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 0.5rem;
        margin-top: 1.5rem;
        margin-bottom: 1rem;
      }
      .analysis-content h3:first-child {
        margin-top: 0;
      }
      .analysis-content p {
        line-height: 1.8;
        color: #e5e7eb; /* gray-200 */
        margin-bottom: 0.8rem;
      }
      .analysis-content ul {
        list-style-type: none;
        padding-left: 0;
      }
      .analysis-content li {
        margin-bottom: 0.5rem;
        padding-left: 1rem;
        border-left: 2px solid #7000ff; /* cyber-secondary */
      }
      .analysis-content .highlight {
        color: #00f0ff;
        font-weight: bold;
      }
    </style>
